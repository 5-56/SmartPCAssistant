name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release

      - name: Publish
        run: |
          dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Create ZIP
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath ./SmartPCAssistant-${{ github.ref_name }}-win-x64.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./publish/SmartPCAssistant.exe
            ./SmartPCAssistant-${{ github.ref_name }}-win-x64.zip
          body: |
            ## SmartPCAssistant v${{ github.ref_name }}
            全智能控制电脑的 AI 助手

            ### 下载说明
            - `SmartPCAssistant.exe` - 单文件可执行程序
            - `.zip` 压缩包 - 包含所有依赖

            ### 系统要求
            - Windows 10/11
            - 无需安装 .NET Runtime (自包含)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-portable:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        run: dotnet restore

      - name: Build
        run: dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o ./publish

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SmartPCAssistant-win-x64
          path: ./publish/SmartPCAssistant.exe
